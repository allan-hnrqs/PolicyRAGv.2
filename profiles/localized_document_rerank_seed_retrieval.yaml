name: localized_document_rerank_seed_retrieval
description: >
  Baseline retrieval with localized page reranking: rerank only the document
  neighborhood implied by the base retrieval results, then inject intro chunks
  and re-score chunks inside those locally reranked pages.
collection_strategy: default_web_collect
retrieval:
  source_topology: bg_primary_support_fallback
  retrieval_mode: hybrid_es_rerank
  top_k: 16
  candidate_k: 48
  retrieval_alpha: 0.7
  rerank_top_n: 0
  enable_mmr_diversity: false
  mmr_lambda: 0.75
  enable_query_decomposition: true
  max_expanded_queries: 2
  per_query_candidate_k: 24
  query_fusion_rrf_k: 60
  enable_document_seed_retrieval: true
  document_seed_ranking_mode: rerank_docs
  document_seed_scope: local_graph
  document_seed_scope_docs: 4
  document_seed_docs: 3
  document_seed_intro_max_order: 10
  document_seed_intro_chunks: 3
  document_seed_candidate_k: 12
  document_seed_max_chars: 1400
chunking:
  chunker: section_chunker
  metadata_enrichers:
    - authority_metadata
    - lineage_metadata
    - source_topology_metadata
  sliding_window_chars: 1200
  sliding_window_overlap: 200
answering:
  strategy: inline_evidence_chat
  max_packed_docs: 24
  max_doc_chars: 1600
  model_name: command-a-03-2025
evaluation:
  suite_name: parity_19
  judge_model: command-a-03-2025
  chat_temperature: 0.0
