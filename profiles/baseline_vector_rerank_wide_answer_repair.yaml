name: baseline_vector_rerank_wide_answer_repair
description: >
  Wide-budget hybrid retrieval with bounded Cohere reranking, paired with the
  selective mode-aware answer repair path. This tests whether a larger evidence
  shortlist plus claim-plan-and-repair answering can beat the plain inline
  baseline on quality without blowing past browse-agent latency.
collection_strategy: default_web_collect
retrieval:
  source_topology: bg_primary_support_fallback
  retrieval_mode: hybrid_es_rerank
  dense_retrieval_backend: elasticsearch_knn
  top_k: 16
  candidate_k: 96
  retrieval_alpha: 0.7
  rerank_top_n: 96
  es_knn_num_candidates: 240
  enable_mmr_diversity: false
  mmr_lambda: 0.75
  enable_query_decomposition: true
  max_expanded_queries: 2
  per_query_candidate_k: 48
  query_fusion_rrf_k: 60
  enable_parallel_query_branches: false
chunking:
  chunker: section_chunker
  metadata_enrichers:
    - authority_metadata
    - lineage_metadata
    - source_topology_metadata
  sliding_window_chars: 1200
  sliding_window_overlap: 200
answering:
  strategy: selective_mode_aware_answer_repair_inline_evidence_chat
  max_packed_docs: 24
  max_doc_chars: 1600
  model_name: command-a-03-2025
evaluation:
  suite_name: parity_19
  judge_model: command-a-03-2025
  chat_temperature: 0.0
