name: baseline_vector_rerank_shortlist_ranked_diverse
description: >
  Serious rerank-shortlist control with a packing redesign: preserve global
  rerank order across all source families, then apply ranked chunk diversity to
  reduce document and heading monopolies in the final packed evidence bundle.
collection_strategy: default_web_collect
retrieval:
  source_topology: ranked_passthrough
  retrieval_mode: hybrid_es_rerank
  dense_retrieval_backend: elasticsearch_knn
  top_k: 16
  candidate_k: 48
  retrieval_alpha: 0.7
  rerank_top_n: 48
  es_knn_num_candidates: 120
  enable_mmr_diversity: false
  mmr_lambda: 0.75
  enable_query_decomposition: true
  max_expanded_queries: 2
  per_query_candidate_k: 24
  query_fusion_rrf_k: 60
  enable_parallel_query_branches: false
  enable_ranked_chunk_diversity: true
  diversity_cover_fraction: 0.5
  max_chunks_per_document: 8
  max_chunks_per_heading: 3
  seed_chunks_per_heading: 2
chunking:
  chunker: section_chunker
  metadata_enrichers:
    - authority_metadata
    - lineage_metadata
    - source_topology_metadata
  sliding_window_chars: 1200
  sliding_window_overlap: 200
answering:
  strategy: inline_evidence_chat
  max_packed_docs: 24
  max_doc_chars: 1600
  model_name: command-a-03-2025
evaluation:
  suite_name: parity_19
  judge_model: command-a-03-2025
  chat_temperature: 0.0
