name: structural_context_expansion
description: >
  Baseline retrieval with deterministic structural context augmentation:
  selected evidence can pull in page-intro chunks, nearby same-document chunks,
  and sibling workflow-page intro chunks before reranking.
collection_strategy: default_web_collect
retrieval:
  source_topology: bg_primary_support_fallback
  retrieval_mode: hybrid_es_rerank
  top_k: 16
  candidate_k: 48
  retrieval_alpha: 0.7
  rerank_top_n: 0
  enable_mmr_diversity: false
  mmr_lambda: 0.75
  enable_query_decomposition: true
  max_expanded_queries: 2
  per_query_candidate_k: 24
  query_fusion_rrf_k: 60
  enable_structural_context_augmentation: true
  structural_context_seed_docs: 2
  structural_context_intro_max_order: 10
  structural_context_same_heading_k: 2
  structural_context_nearby_k: 3
  structural_context_nearby_window: 12
  structural_context_neighbor_docs: 2
chunking:
  chunker: section_chunker
  metadata_enrichers:
    - authority_metadata
    - lineage_metadata
    - scope_tag_metadata
    - source_topology_metadata
  sliding_window_chars: 1200
  sliding_window_overlap: 200
answering:
  strategy: inline_evidence_chat
  max_packed_docs: 24
  max_doc_chars: 1600
  model_name: command-a-03-2025
evaluation:
  suite_name: parity_19
  judge_model: command-a-03-2025
  chat_temperature: 0.0
